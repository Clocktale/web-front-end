<ng-container *transloco="let t; prefix: 'auth.login'">
  <div class="login-layout">
    <div
      class="login-layout__image"
      role="img"
      [attr.aria-label]="t('imageAlt')"
    ></div>
    <div class="login-layout__form">
      <form
        class="login-form"
        [class.login-form--loading]="login.loading()"
        (submit)="onSubmit($event)"
        novalidate
      >
        <header class="login-form__header">
          <h1 class="login-form__title">{{ t('title') }}</h1>
          <p class="login-form__subtitle">{{ t('subtitle') }}</p>
        </header>

        <app-text-field
          [label]="t('emailLabel')"
          [placeholder]="t('emailPlaceholder')"
          type="text"
          [value]="login.email()"
          (valueChanged)="login.setEmail($event)"
          [loading]="login.loading()"
          autocomplete="username"
        >
          <svg
            leading
            class="login-form__field-icon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
              fill="currentColor"
            />
          </svg>
        </app-text-field>

        <app-text-field
          [label]="t('passwordLabel')"
          [placeholder]="t('passwordPlaceholder')"
          [type]="login.passwordFieldType()"
          [value]="login.password()"
          (valueChanged)="login.setPassword($event)"
          [errorText]="login.error()"
          [loading]="login.loading()"
          autocomplete="current-password"
        >
          <svg
            leading
            class="login-form__field-icon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"
              fill="currentColor"
            />
          </svg>
          <button
            trailing
            type="button"
            class="login-form__icon-button"
            [attr.aria-label]="
              login.passwordVisible() ? t('eyeHide') : t('eyeShow')
            "
            (click)="login.togglePasswordVisibility()"
          >
            @if (login.passwordVisible()) {
              <svg
                class="login-form__field-icon"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 0 0 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78 3.15 3.15.02-.16c0-2.76-2.24-5-5-5l-.17.01z"
                  fill="currentColor"
                />
              </svg>
            } @else {
              <svg
                class="login-form__field-icon"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <path
                  d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
                  fill="currentColor"
                />
              </svg>
            }
          </button>
        </app-text-field>

        <label class="login-form__remember">
          <input
            type="checkbox"
            class="login-form__checkbox"
            [checked]="login.rememberMe()"
            [disabled]="login.loading()"
            (change)="onRememberMeChange($event)"
          />
          <span>{{ t('rememberMe') }}</span>
        </label>

        <app-button
          type="submit"
          [variant]="ButtonVariant.Primary"
          [fullWidth]="true"
          [loading]="login.loading()"
        >
          {{ t('submitPrimary') }}
        </app-button>

        <app-button
          type="button"
          [variant]="ButtonVariant.Text"
          [fullWidth]="true"
          [disabled]="login.loading()"
          (clicked)="login.continueAsGuest()"
        >
          {{ t('continueGuest') }}
        </app-button>

        <p class="login-form__footer">
          {{ t('noAccount') }}
          <a
            href="/signup"
            class="login-form__footer-link"
            (click)="onSignUpClick($event)"
          >
            {{ t('signUp') }}
          </a>
        </p>
      </form>
    </div>
  </div>
</ng-container>
